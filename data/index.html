<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>VertiCar Control</title>
        <style>
            body { 
                font-family: Arial;
                text-align: center;
                margin-top: 50px;
                background-color: #222;
                color: white;
            }
            #status {
                font-size: 24px;
                font-weight: bold;
                color: red;
            }
            /* Nowy styl dla parametrów sieci */
            #network-status {
                font-family: monospace;
                font-size: 18px;
                color: #aaa;
                margin-top: 15px;
                background-color: #333;
                padding: 10px;
                border-radius: 8px;
                display: inline-block;
            }
            .data {
                font-family: monospace;
                font-size: 20px;
                color: #00ff00;
                margin-top: 20px;
            }
        </style>
    </head>
    <body>
        <h1>VertiCar Control</h1>
        <div id="status">Connecting... (Press any key to start)</div>
        
        <div id="network-status">
            Link: <span id="connSpan" style="color: orange;">Connecting...</span>
            Ping: <span id="pingSpan">---</span> ms
        </div>

        <div class="data">X: <span id="valX">0</span> | Y: <span id="valY">0</span></div>
        <div class="telemetry-box">
            <p>Kąt: <span id="valAngle">0.00</span>&deg;</p>
            <p>Prąd silników: <span id="valCurrent">0.00</span> A</p>
        </div>

        <hr>

        <div class="pid-box">
            <h3>Nastawy PID</h3>
            <label>P: <input type="number" id="inputP" step="0.01" value="0.0"></label>
            <label>I: <input type="number" id="inputI" step="0.01" value="0.0"></label>
            <label>D: <input type="number" id="inputD" step="0.01" value="0.0"></label>
            <button onclick="sendPidTunings()">Aktualizuj PID</button>
        </div>

        <div id="debug-box" style="color: red; background: #222; padding: 10px; font-family: monospace;">
        Błędy: brak
        </div>
        <script>
            // Elements
            const statusEl = document.getElementById('status');
            const valXEl = document.getElementById('valX');
            const valYEl = document.getElementById('valY');
            const valAngle = document.getElementById('valAngle');
            const valCurrent = document.getElementById('valCurrent');
            const connSpan = document.getElementById('connSpan');
            const pingSpan = document.getElementById('pingSpan');

            // Network telemetry logic
            let pingStart = 0;
            let missedPings = 0;

            // Connect to server
            const ws = new WebSocket('ws://' + window.location.hostname + ':81/');
            
            ws.onopen = () => {
                console.log('Connected to WebSocket');
                connSpan.innerText = 'Connected';
                connSpan.style.color = "lime";
                missedPings = 0;
            };

            ws.onclose = () => { 
                console.log('Disconnected from WebSocket');
                connSpan.innerText = 'Disconnected';
                connSpan.style.color = "red";
                pingSpan.innerText = "---";
            };

            // Receive messages (Ping/Pong logic)
            ws.onmessage = (event) => {
                if (event.data === "pong") {
                    missedPings = 0; // Reset lost packets
                    let pingTime = Math.round(performance.now() - pingStart);
                    
                    connSpan.innerText = 'Stable';
                    connSpan.style.color = "lime";
                    pingSpan.innerText = pingTime;
                }
                else
                {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.t === "tele") {
                            document.getElementById('valAngle').innerText = data.ang.toFixed(2);
                            document.getElementById('valCurrent').innerText = data.curr.toFixed(2);
                        }
                    }
                    catch (error) {
                        document.getElementById('debug-box').innerText = "Błąd: " + error.message;
                    }
                }
            };

            // Send ping every 500ms
            setInterval(() => {
                if (ws.readyState === WebSocket.OPEN) {
                    pingStart = performance.now();
                    ws.send("ping");
                    missedPings++;

                    if (missedPings > 2) {
                        connSpan.innerText = 'Lag / Packet Loss!';
                        connSpan.style.color = "orange";
                    }
                }
            }, 200);

            // Read controler
            function updateGamepad() {
                const gamepads = navigator.getGamepads();
                const gp = gamepads[0]; // Assuming the first gamepad is used
                
                if (gp) {
                    statusEl.innerText = 'controler connected.';
                    statusEl.style.color = "lime";
                    
                    let x = gp.axes[0]; // Left stick X-axis
                    let y = gp.axes[1] * (-1); // Left stick Y-axis
                    
                    if (Math.abs(x) < 0.1) x = 0; // Deadzone
                    if (Math.abs(y) < 0.1) y = 0; // Deadzone

                    valXEl.innerText = x.toFixed(2); // Zaokrąglenie dla czytelności
                    valYEl.innerText = y.toFixed(2);
                    
                    if (ws.readyState === WebSocket.OPEN) {
                        const msg = JSON.stringify({t: "ctrl", x: x, y: y});
                        ws.send(msg);
                    }
                } else {
                    statusEl.innerText = 'No controler detected. Please connect a gamepad and press any key.';
                    statusEl.style.color = "red";
                }
                requestAnimationFrame(updateGamepad);
            }


            // 2. Wysyłanie nowych nastawów do ESP32
            function sendPidTunings() {
                // Pobranie wartości z okienek i zamiana na liczby zmiennoprzecinkowe (float)
                const pVal = parseFloat(document.getElementById('inputP').value);
                const iVal = parseFloat(document.getElementById('inputI').value);
                const dVal = parseFloat(document.getElementById('inputD').value);

                // Zbudowanie obiektu JSON z flagą 't'
                const payload = {
                    t: "TUNE_PID", // Ważna flaga!
                    p: pVal,
                    i: iVal,
                    d: dVal
                };

                // Wysłanie JSON-a przez WebSocket
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify(payload));
                    alert("Wysłano nowe nastawy!"); // Szybkie potwierdzenie dla Ciebie
                } else {
                    alert("Brak połączenia z robotem!");
                }
            }
            updateGamepad();
        </script>
    </body>
</html>
